model:
  base_learning_rate: 1.0e-6
  target: refnet.models.trainer.sdxl.ColorizerXLTrainer
  params:
    linear_start: 0.00085
    linear_end: 0.0120
    timesteps: 1000
    first_stage_key: image
    cond_stage_key: reference
    control_key: control
    score_key: aesthetic_score
    image_size: 128
    channels: 4
    scale_factor: 0.13025
    use_ema: false
    token_type: full
    pooled_wd_emb: false
    parameterization: v
    control_drop: [ 0., 0., 0., 0. ]

    unet_config:
      target: refnet.modules.unet.DualCondUNetXL
      params:
        use_checkpoint: True
        in_channels: 4
        out_channels: 4
        model_channels: 320
        adm_in_channels: 512
        num_classes: sequential
        attention_resolutions: [4, 2]
        num_res_blocks: 2
        channel_mult: [1, 2, 4]
        num_head_channels: 64
        use_spatial_transformer: true
        use_linear_in_transformer: true
        transformer_depth: [1, 2, 10]
        context_dim: 2048

    first_stage_config:
      target: ldm.models.autoencoder.AutoencoderKL
      params:
        embed_dim: 4
        ddconfig:
          double_z: true
          z_channels: 4
          resolution: 512
          in_channels: 3
          out_ch: 3
          ch: 128
          ch_mult: [1, 2, 4, 4]
          num_res_blocks: 2
          attn_resolutions: []
          dropout: 0.0

    cond_stage_config:
      target: refnet.modules.embedder.HFCLIPVisionModel
      params:
        arch: ViT-bigG-14

    img_embedder_config:
      target: refnet.modules.embedder.WDv14SwinTransformerV2

    control_encoder_config:
      target: refnet.modules.encoder.MultiScaleAttentionEncoder
      params:
        in_ch: 3
        model_channels: 320
        ch_mults: [1, 2, 4]

    proj_config:
      target: refnet.modules.proj.ClusterConcat
      params:
        input_dim: 1280
        c_dim: 1024
        output_dim: 2048
        token_length: 196
        dim_head: 128

    scalar_embedder_config:
      target: refnet.modules.embedder.TimestepEmbedding
      params:
        embed_dim: 256

dataloader:
  class: TripletLoader
  dataset_params:
    condition_key: color
  transforms:
    transform_list:
      flip: true
      rotate: false
      resize: true
      jitter: false
      rotate_range: 45
    load_size: 1024
    crop_size: 1024     # crop images to (crop_size, crop_size), randomly crop images when crop_size < load_size
    keep_ratio: false
    inverse_grayscale: true
  shuffle: false